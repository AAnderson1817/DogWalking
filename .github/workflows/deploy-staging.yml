name: Deploy staging (Supabase)

# Applies migrations and deploys all edge functions to the staging Supabase
# project. Run it from the Actions tab (workflow_dispatch) or by pushing to
# main. One-time project setup lives in docs/dev/staging-setup.md.
#
# Required repository secrets:
#   SUPABASE_ACCESS_TOKEN   personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF    the project's ref (Settings → General)
#   SUPABASE_DB_PASSWORD    the project's database password
# For the optional "sync edge secrets" step:
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, VAULT_MASTER_KEY, APP_BASE_URL
#   and optionally RESEND_API_KEY, NOTIFY_FROM_EMAIL

# Deploy only after CI passes on main (workflow_run gate) — a red commit
# must never migrate the live database. Manual runs (workflow_dispatch) are
# still allowed for secret syncs / re-deploys.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sync_secrets:
        description: "Also push edge-function secrets from GitHub secrets"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # A real job (not a job-level `if`) that FAILS when the trigger isn't a
  # successful push-CI run from this repo. A skipped `if` would let the run
  # still conclude 'success' and fire the chained smoke test after a red CI;
  # a failing gate turns the whole run red so nothing downstream runs.
  gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed on a push to this repo
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch — allowed"; exit 0
          fi
          conclusion="${{ github.event.workflow_run.conclusion }}"
          evt="${{ github.event.workflow_run.event }}"
          repo="${{ github.event.workflow_run.head_repository.full_name }}"
          if [ "$conclusion" = "success" ] && [ "$evt" = "push" ] \
             && [ "$repo" = "${{ github.repository }}" ]; then
            echo "CI green on a push to ${{ github.repository }} — deploying"; exit 0
          fi
          echo "Refusing to deploy: conclusion=$conclusion event=$evt repo=$repo"
          exit 1

  migrate:
    name: Apply migrations
    needs: gate
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: supabase/setup-cli@v1  # floating tag: the v2.1.1 SHA pin was unverifiable; v1 is proven by every prior deploy
        with:
          version: 2.109.1  # pinned to current latest; 2.99.0 predates the local_smtp config key and broke `supabase link`

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        run: supabase db push

  deploy-functions:
    name: Deploy edge functions
    needs: migrate
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: supabase/setup-cli@v1  # floating tag: the v2.1.1 SHA pin was unverifiable; v1 is proven by every prior deploy
        with:
          version: 2.109.1  # pinned to current latest; 2.99.0 predates the local_smtp config key and broke `supabase link`

      # Deploys every function directory; config.toml carries
      # verify_jwt=false for stripe-webhook and the materializer cron note.
      - name: Deploy all functions
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

  sync-secrets:
    name: Sync edge secrets (opt-in)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_secrets }}
    needs: migrate
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: supabase/setup-cli@v1  # floating tag: the v2.1.1 SHA pin was unverifiable; v1 is proven by every prior deploy
        with:
          version: 2.109.1  # pinned to current latest; 2.99.0 predates the local_smtp config key and broke `supabase link`

      - name: Push edge-function secrets
        run: |
          args=()
          add() { if [ -n "$2" ]; then args+=("$1=$2"); else echo "skip: $1 not set"; fi; }
          add STRIPE_SECRET_KEY   "${{ secrets.STRIPE_SECRET_KEY }}"
          add STRIPE_WEBHOOK_SECRET "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
          add VAULT_MASTER_KEY    "${{ secrets.VAULT_MASTER_KEY }}"
          add APP_BASE_URL        "${{ secrets.APP_BASE_URL }}"
          add RESEND_API_KEY      "${{ secrets.RESEND_API_KEY }}"
          add NOTIFY_FROM_EMAIL   "${{ secrets.NOTIFY_FROM_EMAIL }}"
          if [ ${#args[@]} -eq 0 ]; then echo "nothing to sync"; exit 0; fi
          supabase secrets set "${args[@]}" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
